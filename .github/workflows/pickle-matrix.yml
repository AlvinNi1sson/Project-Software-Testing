name: Pickle Stability Matrix

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pickle-stability:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10","3.13"]
        protocol: [0, 5]
        hashseed: ["0", "random"]

    runs-on: ${{ matrix.os }}

    env:
      PICKLE_PROTOCOL: ${{ matrix.protocol }}
      PYTHONHASHSEED: ${{ matrix.hashseed }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run pickle matrix test
        run: python tests/pickle_matrix_runner.py

      - name: Upload result artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pickle-result-${{ matrix.os }}-py${{ matrix.python-version }}-p${{ matrix.protocol }}-seed${{ matrix.hashseed }}
          path: results/*.json

  compare-results:
    needs: pickle-stability
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10","3.13"]
        hashseed: ["0", "random"]

    runs-on: ${{ matrix.os }}

    env:
      PYTHONHASHSEED: ${{ matrix.hashseed }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download all result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pickle-result-*
          path: results
          merge-multiple: true

      - name: Show downloaded files
        run: ls -R results

      - name: Compare pickle results
        run: python compare_results.py
