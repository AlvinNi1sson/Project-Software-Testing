name: Pickle Stability Matrix

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pickle-stability:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        protocol: [0, 1, 2, 3, 4, 5]
        hashseed: ["0", "1", "42", "random"]

    runs-on: ${{ matrix.os }}

    env:
      PICKLE_PROTOCOL: ${{ matrix.protocol }}
      PYTHONHASHSEED: ${{ matrix.hashseed }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run pickle matrix test
        run: python tests/pickle_matrix_runner.py

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.os }}-py${{ matrix.python-version }}-p${{ matrix.protocol }}-seed${{ matrix.hashseed }}
          path: results/*.json